<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Аннотации — Отец Тук</title>
<link href="https://fonts.googleapis.com/css2?family=Gabriela&family=Archivo+Black&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #14111a;
    --card-bg: #fffdf8;
    --ink: #1a1a24;
    --gold: #c9a227;
    --tan: #d1b394;
    --amber: #d9763a;
    --amber-deep: #8a4a1e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background:
      radial-gradient(circle at 10% 90%, rgba(217,118,58,0.10), transparent 45%),
      radial-gradient(circle at 90% 95%, rgba(201,162,39,0.12), transparent 45%),
      #faf0dc;
    color: var(--ink);
    font-family: 'Gabriela', Georgia, serif;
    line-height: 1.6;
    min-height: 100vh;
  }
  .topnav {
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 32px;
    background: rgba(20, 17, 26, 0.92);
    backdrop-filter: blur(8px);
  }
  .topnav .brand {
    color: var(--tan);
    font-size: 18px;
    letter-spacing: 0.5px;
    text-decoration: none;
  }
  .topnav .brand b { color: var(--gold); }
  .topnav a.back {
    color: #cfc7d6;
    text-decoration: none;
    font-size: 14px;
  }
  .topnav a.back:hover { color: var(--gold); }

  .page-wrap {
    max-width: 1020px;
    margin: 0 auto;
    padding: 48px 24px 90px;
  }
  h1 {
    color: #5c2e1c;
    font-size: 30px;
    margin-bottom: 8px;
  }
  .subtitle {
    color: #7a4a35;
    font-size: 15px;
    margin-bottom: 30px;
  }

  /* ===== Сетка обложек — те же стили, что в каталоге на главной ===== */
  .book-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 20px;
  }

  .book-card {
    background: #1f1b29;
    border-radius: 12px;
    padding: 18px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
  }
  .book-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 24px rgba(0,0,0,0.25);
  }
  .book-card.active {
    border-color: var(--gold);
  }

  .book-card .book-cover {
    width: 100%;
    aspect-ratio: 3/4;
    border-radius: 8px;
    background: linear-gradient(160deg, #3a2f45, #221a2b);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 14px;
    overflow: hidden;
  }
  .book-card .book-cover img { width: 60%; opacity: 0.9; }

  .book-card.photo-cover .book-cover {
    position: relative;
    background-size: cover;
    background-position: center;
    align-items: stretch;
    justify-content: stretch;
    margin-bottom: 0;
  }
  .book-card.photo-cover .cover-title {
    position: absolute;
    top: 14px;
    left: 14px;
    right: 14px;
    z-index: 2;
    text-align: center;
    color: #fff8ec;
    font-size: 20px;
    margin: 0;
    text-shadow: 0 2px 6px rgba(0,0,0,0.65), 0 1px 2px rgba(0,0,0,0.5);
  }
  .book-card.photo-cover .cover-text {
    position: absolute;
    left: 14px;
    right: 14px;
    bottom: 12px;
    z-index: 2;
    text-align: center;
  }
  .book-card.photo-cover .cover-text p {
    color: #ffffff;
    font-size: 12px;
    margin: 0;
    text-shadow:
      -1px -1px 0 rgba(0,0,0,0.85),
       1px -1px 0 rgba(0,0,0,0.85),
      -1px  1px 0 rgba(0,0,0,0.85),
       1px  1px 0 rgba(0,0,0,0.85),
       0 2px 6px rgba(0,0,0,0.5);
  }
  .book-card.photo-cover { padding: 0; overflow: hidden; }
  .book-card.photo-cover.active { border-color: var(--gold); }

  .book-card.photo-cover.cover-cool .cover-title {
    color: #eaf1f5;
  }

  .book-card h3 {
    color: #f1e9d8;
    font-size: 16px;
    margin-bottom: 4px;
  }
  .book-card p {
    color: #9a8fae;
    font-size: 13px;
  }

  .empty, .error {
    color: #8a7a64;
    font-size: 15px;
  }

  /* ===== Раскрывающаяся панель аннотации ===== */
  .ann-panel {
    display: none;
    background: var(--card-bg);
    border-radius: 14px;
    padding: 26px 28px;
    margin-top: 26px;
    box-shadow: 0 10px 28px rgba(74,42,22,0.18);
  }
  .ann-panel.show {
    display: block;
    animation: annIn 0.2s ease;
  }
  @keyframes annIn {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .ann-panel h2 {
    color: var(--amber-deep);
    font-size: 22px;
    margin-bottom: 4px;
  }
  .ann-meta {
    color: #8a7a64;
    font-size: 13px;
    margin-bottom: 14px;
    font-style: italic;
  }
  .ann-desc {
    color: #3a2a1a;
    font-size: 15px;
    line-height: 1.75;
    white-space: pre-line;
  }
  .ann-link {
    display: inline-block;
    margin-top: 16px;
    color: var(--amber-deep);
    text-decoration: none;
    font-size: 14px;
    border-bottom: 1px solid var(--amber-deep);
  }
  .ann-link:hover { color: var(--amber); border-color: var(--amber); }
  .ann-close {
    float: right;
    background: none;
    border: none;
    color: #8a7a64;
    font-size: 18px;
    cursor: pointer;
    line-height: 1;
  }
  .ann-close:hover { color: var(--amber-deep); }
  .ann-body { display: flex; gap: 24px; align-items: flex-start; margin-top: 12px; }
  .ann-text { flex: 1; min-width: 0; }
  .ann-video { flex-shrink: 0; width: 200px; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 14px rgba(0,0,0,0.25); display: none; }
  .ann-video.show { display: block; }
  .ann-video iframe { width: 200px; height: 355px; border: none; display: block; }
  @media (max-width: 640px) { .ann-body { flex-direction: column; } .ann-video, .ann-video iframe { width: 100%; } .ann-video iframe { height: 300px; } }
</style>
</head>
<body>

  <nav class="topnav">
    <a href="./index.html" class="brand"><b>Отец Тук</b></a>
    <a href="./index.html" class="back">← Главная</a>
  </nav>

  <div class="page-wrap">
    <h1>Аннотации</h1>
    <p class="subtitle">Нажмите на обложку, чтобы прочитать аннотацию</p>

    <div class="book-grid" id="bookGrid">
      <p class="empty">Загрузка…</p>
    </div>

    <div class="ann-panel" id="annPanel">
      <button class="ann-close" id="annClose" aria-label="Закрыть">✕</button>
      <h2 id="annTitle"></h2>
      <p class="ann-meta" id="annMeta"></p>
      <div class="ann-body">
        <div class="ann-text">
          <p class="ann-desc" id="annDesc"></p>
          <a class="ann-link" id="annLink" href="#">Читать →</a>
        </div>
        <div class="ann-video" id="annVideo">
          <iframe src="https://www.youtube.com/embed/4RKBYcoJgEU" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>
      </div>
    </div>
  </div>

  <script>
    let booksData = [];
    let activeIndex = null;

    const annPanel = document.getElementById('annPanel');
    const annTitle = document.getElementById('annTitle');
    const annMeta = document.getElementById('annMeta');
    const annDesc = document.getElementById('annDesc');
    const annLink = document.getElementById('annLink');
    const annClose = document.getElementById('annClose');

    function closeAnnotation() {
      annPanel.classList.remove('show');
      if (activeIndex !== null) {
        const prevCard = document.querySelector(`.book-card[data-index="${activeIndex}"]`);
        if (prevCard) prevCard.classList.remove('active');
      }
      activeIndex = null;
    }

    function openAnnotation(index) {
      const book = booksData[index];
      if (!book) return;

      if (activeIndex === index) {
        closeAnnotation();
        return;
      }

      if (activeIndex !== null) {
        const prevCard = document.querySelector(`.book-card[data-index="${activeIndex}"]`);
        if (prevCard) prevCard.classList.remove('active');
      }

      activeIndex = index;
      const card = document.querySelector(`.book-card[data-index="${index}"]`);
      if (card) card.classList.add('active');

      annTitle.textContent = book.title;
      annMeta.textContent = [book.author, book.genre, book.status === 'finished' ? 'завершена' : 'в процессе']
        .filter(Boolean).join(' · ');
      annDesc.textContent = book.description || 'Аннотация пока не добавлена.';
      annLink.href = `./contents.html?book=${book.slug}`;
      const annVideo = document.getElementById('annVideo');
      if (book.slug === 'temny-voschod') { annVideo.classList.add('show'); } else { annVideo.classList.remove('show'); }
      annPanel.classList.add('show');
      annPanel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    annClose.addEventListener('click', closeAnnotation);

    (async function loadBooks() {
      const grid = document.getElementById('bookGrid');
      try {
        const res = await fetch('/api/books');
        const books = await res.json();
        booksData = books;

        if (!books.length) {
          grid.innerHTML = '<p class="empty">Книги пока не добавлены.</p>';
          return;
        }

        const photoCoverConfig = {
          'Тёмный Восход': { folder: 'Tyumny_voshod_card' },
          'Чистория': { folder: 'Chistoriya_card', themeClass: 'cover-cool' },
        };

        const randomCovers = {};
        await Promise.all(
          Object.entries(photoCoverConfig).map(async ([title, cfg]) => {
            try {
              const coverRes = await fetch(`/api/covers/${cfg.folder}`);
              if (coverRes.ok) {
                const files = await coverRes.json();
                if (files.length) {
                  randomCovers[title] = files[Math.floor(Math.random() * files.length)];
                }
              }
            } catch (err) {
              console.error(`Не удалось загрузить случайную обложку для "${title}":`, err);
            }
          })
        );

        grid.innerHTML = books.map((book, index) => {
          const cfg = photoCoverConfig[book.title];
          const randomFile = randomCovers[book.title];

          if (cfg && randomFile) {
            const coverUrl = `./img/covers/${cfg.folder}/${randomFile}`;
            const themeClass = cfg.themeClass ? ` ${cfg.themeClass}` : '';
            return `
              <div class="book-card photo-cover${themeClass}" data-index="${index}">
                <div class="book-cover" style="background-image:url('${coverUrl}')">
                  <h3 class="cover-title">${escapeHtml(book.title)}</h3>
                  <div class="cover-text">
                    <p>${escapeHtml(book.author)}</p>
                  </div>
                </div>
              </div>
            `;
          }
          return `
            <div class="book-card" data-index="${index}">
              <div class="book-cover">
                ${book.cover_image
                  ? `<img src="${book.cover_image}" alt="">`
                  : `<img src="./img/fugu1.svg" alt="" style="opacity:0.5">`}
              </div>
              <h3>${escapeHtml(book.title)}</h3>
              <p>${escapeHtml(book.author)}</p>
            </div>
          `;
        }).join('');

        grid.querySelectorAll('.book-card').forEach(card => {
          card.addEventListener('click', () => {
            openAnnotation(parseInt(card.dataset.index, 10));
          });
        });
      } catch (err) {
        grid.innerHTML = '<p class="error">Не удалось загрузить книги.</p>';
        console.error(err);
      }
    })();

    function escapeHtml(str) {
      if (!str) return '';
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }
  </script>

</body>
</html>
