<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход / Регистрация</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a24;
      color: #e8e8ec;
    }
    .auth-box {
      max-width: 380px;
      width: 100%;
      margin: 20px;
      padding: 32px;
      border-radius: 12px;
      background: #24242f;
    }
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }
    .tabs button {
      flex: 1;
      padding: 10px;
      background: transparent;
      border: 1px solid #3a3a48;
      color: #888;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    .tabs button.active {
      background: #c9a227;
      color: #1a1a24;
      border-color: #c9a227;
      font-weight: 600;
    }
    h2 { text-align: center; color: #c9a227; font-size: 20px; margin: 0 0 20px; }
    label { display: block; margin-bottom: 4px; font-size: 13px; color: #aaa; }
    input {
      width: 100%;
      padding: 10px 12px;
      margin-bottom: 14px;
      border: 1px solid #3a3a48;
      border-radius: 6px;
      background: #1a1a24;
      color: #e8e8ec;
      font-size: 14px;
    }
    button[type="submit"] {
      width: 100%;
      padding: 11px;
      background: #c9a227;
      color: #1a1a24;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    button[type="submit"]:hover { opacity: 0.9; }
    .message { text-align: center; margin-top: 14px; font-size: 13px; min-height: 18px; }
    .form-panel { display: none; }
    .form-panel.active { display: block; }
  </style>
</head>
<body>
  <a href="./index.html" style="position:fixed;top:14px;left:16px;z-index:1000;color:#cfc7d6;text-decoration:none;font-size:13px;background:rgba(255,255,255,0.08);padding:7px 14px;border-radius:6px;">← Главная</a>
  <div class="auth-box">
    <div class="tabs">
      <button id="tab-login" class="active">Войти</button>
      <button id="tab-register">Регистрация</button>
    </div>

    <!-- Вход -->
    <div class="form-panel active" id="panel-login">
      <h2>Вход</h2>
      <form id="loginForm">
        <label for="loginUsername">Имя пользователя</label>
        <input type="text" id="loginUsername" required>
        <label for="loginPassword">Пароль</label>
        <input type="password" id="loginPassword" required>
        <button type="submit">Войти</button>
      </form>
      <div class="message" id="loginMessage"></div>
    </div>

    <!-- Регистрация -->
    <div class="form-panel" id="panel-register">
      <h2>Регистрация</h2>
      <form id="registrationForm">
        <label for="username">Имя пользователя</label>
        <input type="text" id="username" required>
        <label for="email">Электронная почта</label>
        <input type="email" id="email" required>
        <label for="password">Пароль</label>
        <input type="password" id="password" required>
        <button type="submit">Зарегистрироваться</button>
      </form>
      <div class="message" id="message"></div>
    </div>
  </div>

  <script>
    // Переключение вкладок Вход / Регистрация
    const tabLogin = document.getElementById('tab-login');
    const tabRegister = document.getElementById('tab-register');
    const panelLogin = document.getElementById('panel-login');
    const panelRegister = document.getElementById('panel-register');

    tabLogin.addEventListener('click', () => {
      tabLogin.classList.add('active'); tabRegister.classList.remove('active');
      panelLogin.classList.add('active'); panelRegister.classList.remove('active');
    });
    tabRegister.addEventListener('click', () => {
      tabRegister.classList.add('active'); tabLogin.classList.remove('active');
      panelRegister.classList.add('active'); panelLogin.classList.remove('active');
    });

    // Если пришли с ?next=... (например, со страницы книги) — после входа вернёмся туда
    const nextUrl = new URLSearchParams(window.location.search).get('next');

    // ---- Регистрация ----
    document.getElementById('registrationForm').addEventListener('submit', async (event) => {
      event.preventDefault();
      const username = document.getElementById('username').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const messageDiv = document.getElementById('message');

      try {
        const response = await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email, password }),
        });
        const result = await response.json();
        if (response.ok) {
          messageDiv.style.color = '#6fcf6f';
          messageDiv.textContent = result.message + ' Теперь войдите.';
          document.getElementById('registrationForm').reset();
          tabLogin.click();
        } else {
          messageDiv.style.color = '#e05d5d';
          messageDiv.textContent = result.message;
        }
      } catch (error) {
        messageDiv.style.color = '#e05d5d';
        messageDiv.textContent = 'Ошибка подключения к серверу';
      }
    });

    // ---- Вход ----
    document.getElementById('loginForm').addEventListener('submit', async (event) => {
      event.preventDefault();
      const username = document.getElementById('loginUsername').value.trim();
      const password = document.getElementById('loginPassword').value.trim();
      const messageDiv = document.getElementById('loginMessage');

      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const result = await response.json();
        if (response.ok) {
          messageDiv.style.color = '#6fcf6f';
          messageDiv.textContent = 'Вход выполнен!';
          setTimeout(() => {
            window.location.href = nextUrl || './index.html';
          }, 600);
        } else {
          messageDiv.style.color = '#e05d5d';
          messageDiv.textContent = result.message;
        }
      } catch (error) {
        messageDiv.style.color = '#e05d5d';
        messageDiv.textContent = 'Ошибка подключения к серверу';
      }
    });
  </script>
</body>
</html>
